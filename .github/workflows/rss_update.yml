- name: Commit y push de rss.xml si hay cambios
  run: |
    bash -c '
    git config --local user.email "github-actions[bot]@users.noreply.github.com"
    git config --local user.name "github-actions[bot]"
    git add rss.xml
    if ! git diff --cached --quiet; then
      git commit -m "Actualizar RSS automáticamente"
      git push
    else
      echo "No hay cambios en rss.xml, no se hace commit"
    fi
    '
